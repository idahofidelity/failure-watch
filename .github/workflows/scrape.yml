name: Weekly Incident Scraper

on:
  schedule:
    # Every Sunday at 11 PM MT (Monday 06:00 UTC)
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 feedparser python-dateutil lxml

      - name: Run scraper
        env:
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        run: |
          python scraper/scrape.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/scraped_incidents.js data/at_risk_facilities.js || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "IFF Incident Bot"
          git config user.email "bot@idahofidelity.com"
          git add data/scraped_incidents.js data/at_risk_facilities.js
          git commit -m "🤖 Auto-update: $(date +'%Y-%m-%d') weekly scrape"
          git push
